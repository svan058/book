<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 820" font-family="Helvetica, Arial, sans-serif">
  <rect width="1000" height="820" fill="#ffffff"/>

  <!-- Heads (Alice faces right, Bob is the mirror) -->
  <g fill="none" stroke="#222222" stroke-width="2.5">
    <path d="M455 195 C360 150 180 165 140 320 C110 430 150 560 290 590 C360 605 400 600 420 575 C435 558 448 520 452 478 C470 470 470 452 478 442 C462 432 470 420 480 410 C495 392 502 378 500 360 C498 345 478 345 474 330 C470 300 482 250 472 225 C468 210 462 200 455 195 Z"/>
    <g transform="translate(1000,0) scale(-1,1)">
      <path d="M455 195 C360 150 180 165 140 320 C110 430 150 560 290 590 C360 605 400 600 420 575 C435 558 448 520 452 478 C470 470 470 452 478 442 C462 432 470 420 480 410 C495 392 502 378 500 360 C498 345 478 345 474 330 C470 300 482 250 472 225 C468 210 462 200 455 195 Z"/>
    </g>
  </g>

  <!-- Interface lines -->
  <g stroke="#222222" stroke-width="3" stroke-dasharray="12 10">
    <line x1="500" y1="225" x2="500" y2="640"/>
    <line x1="250" y1="405" x2="750" y2="405"/>
  </g>
  <text x="500" y="205" text-anchor="middle" font-size="30" fill="#222222">Interface</text>

  <!-- Alice's nested models (left) -->
  <circle cx="278" cy="352" r="100" fill="#ff2e2e"/>
  <circle cx="250" cy="405" r="40" fill="#34d2e0"/>
  <text x="278" y="300" text-anchor="middle" font-size="22" fill="#111111">
    <tspan x="278" dy="0">Alice's model</tspan>
    <tspan x="278" dy="26">of Bob</tspan>
  </text>

  <!-- Bob's nested models (right) -->
  <circle cx="722" cy="352" r="100" fill="#34d2e0"/>
  <circle cx="750" cy="405" r="40" fill="#ff2e2e"/>
  <text x="722" y="300" text-anchor="middle" font-size="22" fill="#111111">
    <tspan x="722" dy="0">Bob's model</tspan>
    <tspan x="722" dy="26">of Alice</tspan>
  </text>

  <!-- Caption arrows -->
  <g fill="none" stroke="#222222" stroke-width="2">
    <path d="M250 660 C235 560 245 470 252 446" marker-end="url(#arrow)"/>
    <path d="M750 660 C765 560 755 470 748 446" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#222222"/>
    </marker>
  </defs>

  <!-- Captions -->
  <text x="250" y="690" text-anchor="middle" font-size="21" fill="#111111">
    <tspan x="250" dy="0">Alice's model of Bob's</tspan>
    <tspan x="250" dy="25">model of Alice</tspan>
  </text>
  <text x="750" y="690" text-anchor="middle" font-size="21" fill="#111111">
    <tspan x="750" dy="0">Bob's model of Alice's</tspan>
    <tspan x="750" dy="25">model of Bob</tspan>
  </text>

  <!-- Names -->
  <text x="255" y="788" text-anchor="middle" font-size="62" font-weight="bold" fill="#34d2e0">Alice</text>
  <text x="745" y="788" text-anchor="middle" font-size="62" font-weight="bold" fill="#ff2e2e">Bob</text>
</svg>
